<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ustore</title>

    <style>

        *{
            box-sizing: border-box;
        }

        form{
            width: 300px;
            margin: 200px auto;
            text-align: center;
        }

        input{
            display: block;
            margin: 10px auto;
            width: 250px;
            height: 30px;
        }

        .bg-animated { 
            width: 100wh;
	        height: 67vh;
            background: #f0f4f5;
            background: linear-gradient(45deg, #b2b5b6, #eaf4f0, #ffec84, #ecd273,  #f0f4f5);
            background-size: 400%;
            -webkit-animation: animaFundo 20s ease infinite;
            -moz-animation: animaFundo 20s ease infinite;
            animation: animaFundo 20s ease infinite;
          }

          @keyframes animaFundo {

                0% {
                    background-position: 0% 50%
                }
                50% {
                    background-position: 100% 50%
                }
                100% {
                    background-position: 0% 50%
                }

}


    </style>

</head>
<body class="bg-animated">
    

    <form>

        <h3>Login</h3>
        <input type="text" placeholder="Login" id="login">
        <input type="password" placeholder="Senha" id="senha">
        <input type="submit" onclick="logar(); return false">

    </form>


    <script>


        function logar(){

            var login = document.getElementById('login').value;
            var senha = document.getElementById('senha').value;

            if(login == "admin" && senha == "admin"){
                alert('Bem-vindo');
                location.href = "home.html";
            }else{
                alert('Usuario ou senha incorretos');
            }

        }

    </script>

</body>
</html>
